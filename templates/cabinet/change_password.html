{% extends 'base_cabinet.html' %}
{% block title %}Смена пароля — ZooHotel{% endblock %}
{% block cabinet_content %}
<h2 class="page-title"><i class="fa-solid fa-key"></i> Смена пароля</h2>
<div class="card" style="max-width:420px;">
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label class="form-label">{{ field.label }}</label>
        <input type="password" name="{{ field.html_name }}" class="form-control" required>
        {% if field.errors %}<div class="invalid-feedback" style="display:block;">{{ field.errors.0 }}</div>{% endif %}
      </div>
      {% endfor %}
      <div style="display:flex;gap:.75rem;">
        <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Сохранить</button>
        <a href="{% url 'cabinet_profile' %}" class="btn btn-secondary">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
