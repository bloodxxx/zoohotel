{% extends 'base.html' %}
{% block title %}Сброс пароля — ZooHotel{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div class="card" style="width:100%;max-width:420px;">
    <div class="card-header" style="justify-content:center;flex-direction:column;text-align:center;padding:1.5rem;">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--primary);margin:0 auto .75rem;">
        <i class="fa-solid fa-key"></i>
      </div>
      <div style="font-size:1.2rem;font-weight:700;">Восстановление пароля</div>
      <div style="font-size:.85rem;color:var(--muted);margin-top:.25rem;">Введите email, указанный при регистрации</div>
    </div>
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Email <span class="req">*</span></label>
          <input type="email" name="email" class="form-control" required placeholder="example@mail.ru">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          <i class="fa-solid fa-paper-plane"></i> Отправить инструкции
        </button>
      </form>
    </div>
    <div class="card-footer" style="text-align:center;font-size:.85rem;">
      <a href="{% url 'login' %}">← Вернуться ко входу</a>
    </div>
  </div>
</div>
{% endblock %}
