{% extends 'base.html' %}
{% block title %}Новый пароль — ZooHotel{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div class="card" style="width:100%;max-width:420px;">
    <div class="card-header" style="justify-content:center;flex-direction:column;text-align:center;padding:1.5rem;">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--primary);margin:0 auto .75rem;">
        <i class="fa-solid fa-lock"></i>
      </div>
      <div style="font-size:1.2rem;font-weight:700;">Новый пароль</div>
    </div>
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Новый пароль <span class="req">*</span></label>
          <input type="password" name="password1" class="form-control" required minlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">Повторите пароль <span class="req">*</span></label>
          <input type="password" name="password2" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          <i class="fa-solid fa-floppy-disk"></i> Сохранить пароль
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
