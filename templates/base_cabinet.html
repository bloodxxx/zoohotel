{% extends 'base.html' %}
{% block content %}
<div class="container" style="padding-top:2rem;padding-bottom:2rem;display:flex;gap:1.5rem;align-items:flex-start;">
  <aside style="width:220px;flex-shrink:0;">
    <div class="card">
      <div class="card-body" style="text-align:center;padding:1.5rem 1rem;">
        <div style="width:60px;height:60px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--primary);margin:0 auto .75rem;">
          <i class="fa-regular fa-user"></i>
        </div>
        <div style="font-weight:600;font-size:.95rem;">{{ user.get_full_name|default:user.username }}</div>
        <div style="font-size:.8rem;color:var(--muted);">Клиент</div>
      </div>
      <div style="border-top:1px solid var(--border);">
        <ul class="sidebar-nav" style="background:transparent;padding:.25rem 0;">
          <li><a href="{% url 'cabinet_profile' %}" {% if request.resolver_match.url_name == 'cabinet_profile' %}style="color:var(--primary);background:var(--primary-light);"{% endif %} style="color:var(--text);padding:.6rem 1rem;display:flex;gap:.6rem;align-items:center;"><i class="fa-regular fa-user"></i> Профиль</a></li>
          <li><a href="{% url 'cabinet_animals' %}" {% if 'animal' in request.resolver_match.url_name %}style="color:var(--primary);background:var(--primary-light);"{% endif %} style="color:var(--text);padding:.6rem 1rem;display:flex;gap:.6rem;align-items:center;"><i class="fa-solid fa-dog"></i> Мои животные</a></li>
          <li><a href="{% url 'cabinet_bookings' %}" {% if 'booking' in request.resolver_match.url_name %}style="color:var(--primary);background:var(--primary-light);"{% endif %} style="color:var(--text);padding:.6rem 1rem;display:flex;gap:.6rem;align-items:center;"><i class="fa-solid fa-calendar-check"></i> Бронирования</a></li>
          <li><a href="{% url 'cabinet_new_booking' %}" style="color:var(--text);padding:.6rem 1rem;display:flex;gap:.6rem;align-items:center;"><i class="fa-solid fa-plus"></i> Новое бронирование</a></li>
          <li><a href="{% url 'logout' %}" style="color:var(--danger);padding:.6rem 1rem;display:flex;gap:.6rem;align-items:center;"><i class="fa-solid fa-right-from-bracket"></i> Выйти</a></li>
        </ul>
      </div>
    </div>
  </aside>
  <main style="flex:1;min-width:0;">
    {% block cabinet_content %}{% endblock %}
  </main>
</div>
{% endblock %}
